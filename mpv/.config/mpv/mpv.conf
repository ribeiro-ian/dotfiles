# Video Output Driver
profile=gpu-hq
vo=gpu-next
gpu-api=auto
video-sync=display-resample
interpolation=no
deinterlace=no
audio-device=pulse
# High-Quality Scaling (similar to madVR's Jinc/Catmull-Rom)
scale=ewa_lanczossharp
cscale=mitchell
dscale=mitchell
scale-antiring=0.8
cscale-antiring=0.8
# Debanding (removes color banding)
deband=yes
deband-iterations=3
deband-threshold=48
deband-range=16
deband-grain=4
# Hardware Decoding (reduces CPU usage)
hwdec=auto-safe
hwdec-codecs=h264,hevc,av1,vp9,vp8
# General Behavior
keep-open=yes
save-position-on-quit=yes
cursor-autohide=1500
volume=100
volume-max=200
# HDR Settings
target-peak=250
hdr-compute-peak=yes
target-colorspace-hint=yes
tone-mapping=hable
# OSD Settings
osd-bar=no
osd-on-seek=msg-bar
osd-msg3='${time-pos} / ${duration}'
osd-duration=2000
osd-align-x=right
osd-align-y=top
# Audio normalization - best quality
# First apply loudness normalization for consistent volume
af = dynaudnorm=framelen=500:targetrms=0.25:maxgain=5
# Language preferences
alang=jpn,jp,japanese,eng,en,english
slang=pob,por,pt-BR,pt,brazilian,portuguese
# Subtitle styling
sub-font='Arimo Nerd Font'
sub-color='#FCBE11'
sub-border-color='#000000'
sub-border-size=3
sub-shadow-offset=2
sub-shadow-color='#00000080'
sub-font-size=48
sub-pos=100
sub-scale=1.0
sub-ass-override=force
# Screenshots
screenshot-directory=~/Pictures/mpv
screenshot-template="%f-%F"

[vc1-fallback]
profile-desc=Fallback for VC1 videos
hwdec=no
vd=libavcodec:vc1
vd-lavc-software-fallback=yes
deband=no  # Disable debanding to save CPU
scale=bilinear  # Use simpler scaling
