# ================== VIDEO OUTPUT ==================
profile=gpu-hq
vo=gpu-next
gpu-api=auto
gpu-context=waylandvk
opengl-pbo=yes

# ================== DISPLAY (LG 32GN600-B 165Hz) ==================
video-sync=display-resample
video-sync-max-video-change=5
interpolation=yes
interpolation-threshold=0.01
video-output-levels=full

# ================== SCALING ==================
scale=ewa_lanczossharp
cscale=mitchell
dscale=mitchell
scale-antiring=0.8
cscale-antiring=0.8
correct-downscaling=yes
linear-downscaling=yes
linear-upscaling=yes
sigmoid-upscaling=yes

# ================== DEBANDING ==================
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=20
deband-grain=2

# ================== HDR SETTINGS (LINUX) ==================
# Configuração para HDR nativo no Wayland
target-colorspace-hint=yes
target-prim=bt.2020
target-trc=pq
target-peak=350  # LG 32GN600-B tem ~300-350 nits
hdr-compute-peak=yes
hdr-peak-detection=yes
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.30
hdr-contrast-recovery-strength=0.0
tone-mapping=hable
tone-mapping-param=default
tone-mapping-visualize=no

# ================== HARDWARE DECODING (NVIDIA) ==================
hwdec=nvdec
hwdec-codecs=h264,hevc,av1,vp9,vp8,vc1,mpeg2video
vd-lavc-dr=yes
vd-lavc-software-fallback=yes
vd-lavc-threads=0

# ================== DEINTERLACING ==================
deinterlace=yes
deinterlace-field=auto
vd-lavc-deinterlace=yadif:1
field-dominance=auto
deinterlace-keep-fields=no

# ================== ADVANCED AUDIO ==================
af = loudnorm=I=-16:LRA=11:TP=-1.5:print-filters=no, \
     acompressor=threshold=-18dB:ratio=3:attack=10:release=100:makeup=6dB, \
     equalizer=40:width=60:g=-6

# Audio settings
audio-exclusive=no  # Diferente do Windows
audio-buffer=0.2
audio-channels=2.0
audio-normalize-downmix=yes
volume-max=200
volume=100

# ================== LANGUAGE PREFERENCES ==================
alang=jpn,jp,japanese
slang=pob,por,pt-BR,pt,brazilian,portuguese

# ================== SUBTITLE STYLING ==================
sub-font='Arimo Nerd Font'
sub-color='#FCBE11'
sub-border-color='#000000'
sub-border-size=3
sub-shadow-offset=2
sub-shadow-color='#00000080'
sub-font-size=56
sub-pos=100
sub-scale=1.0
sub-ass-override=force

# ================== OSD STYLING ==================
osd-bar=no
osd-align-x=right
osd-align-y=top
osd-font='Arimo Nerd Font'
osd-font-size=32
osd-color='#FCBE11'
osd-border-color='#000000'
osd-border-size=3
osd-shadow-offset=1
osd-shadow-color='#00000080'
osd-on-seek=msg-bar
osd-msg3='${time-pos} / ${duration}'
osd-duration=2000
cursor-autohide=1000

# ================== GENERAL BEHAVIOR ==================
keep-open=yes
save-position-on-quit=yes
cache=yes
cache-secs=300
cache-pause=yes
demuxer-readahead-secs=30

# ================== SCREENSHOTS ==================
screenshot-directory=~/Pictures/mpv
screenshot-template="%f-%F"
screenshot-format=png
screenshot-png-compression=7

# ================== WAYLAND SPECIFIC ==================
# Essencial para HDR funcionar corretamente
wayland-app-id=mpv
wayland-present=yes
x11-bypass-compositor=yes

# ================== PROFILES ==================

[vc1-fallback]
profile-desc=Fallback for VC1 videos
hwdec=no
vd=libavcodec:vc1
deband=no
scale=bilinear
cscale=bilinear

[low-power]
profile-desc=Battery saver mode
hwdec=no
deband=no
scale=bilinear
cscale=bilinear
interpolation=no
video-sync=audio
af=
deinterlace=no