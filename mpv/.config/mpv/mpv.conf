# ──────────────────── VIDEO OUTPUT ────────────────────
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk

# ────────────────── DISPLAY (LG 32GN600-B 165Hz) ──────────────────
video-sync=display-resample
video-sync-max-video-change=5
interpolation=yes
interpolation-threshold=0.01
video-output-levels=full

# ────────────────── SCALING (live-action como padrão) ──────────────────
scale=ewa_lanczossharp
cscale=mitchell
dscale=mitchell
scale-antiring=0.8
cscale-antiring=0.8
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes

# ────────────────── DEBANDING ──────────────────
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=20
deband-grain=4

# ────────────────── HDR SETTINGS ──────────────────
target-colorspace-hint=yes
hdr-compute-peak=yes
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.30

# ────────────────── HARDWARE DECODING (NVIDIA 1050 Ti) ──────────────────
hwdec=nvdec
hwdec-codecs=h264,hevc,av1,vp9,vp8,vc1,mpeg2video
vd-lavc-dr=yes
hwdec-software-fallback=yes
vd-lavc-threads=0

# ────────────────── DEINTERLACING ──────────────────
deinterlace=no

# ────────────────── AUDIO ──────────────────
af=loudnorm=I=-16:LRA=11:TP=-1.5
audio-exclusive=no
audio-buffer=0.2
audio-channels=2.0
audio-normalize-downmix=yes
volume-max=200
volume=100

# ────────────────── LANGUAGE PREFERENCES ──────────────────
alang=jpn,jp,japanese,eng,en
slang=pob,por,pt-BR,pt,brazilian,portuguese

# ────────────────── SUBTITLE STYLING ──────────────────
sub-font='Arimo Nerd Font'
sub-color='#FCBE11'
sub-border-color='#000000'
sub-border-size=3
sub-shadow-offset=2
sub-shadow-color='#00000080'
sub-font-size=60
sub-pos=100
sub-ass-override=force

# ────────────────── OSD STYLING ──────────────────
osd-bar=no
osd-align-x=right
osd-align-y=top
osd-font='Arimo Nerd Font'
osd-font-size=32
osd-color='#FCBE11'
osd-border-color='#000000'
osd-border-size=3
osd-shadow-offset=1
osd-shadow-color='#00000080'
osd-on-seek=msg-bar
osd-msg3='${time-pos} / ${duration}'
osd-duration=2000
cursor-autohide=1000
sub-auto=fuzzy

# ────────────────── GENERAL BEHAVIOR ──────────────────
keep-open=yes
save-position-on-quit=yes
# must be disabled — modernz provides its own OSC replacement
osc=no
# keeps the window alive before a file loads, giving modernz time to
# fully initialize before the first frame; helps on Wayland + Vulkan
idle=yes
cache=yes
cache-secs=300
cache-pause=yes
demuxer-readahead-secs=30

use-filedir-conf=yes
save-position-on-quit=yes
autocreate-playlist=filter
save-watch-history=yes
write-filename-in-watch-later-config=yes
watch-later-options-remove=sub-pos
watch-later-options-remove=sub-scale

# ────────────────── SCREENSHOTS ──────────────────
screenshot-directory=~/Pictures/mpv
screenshot-template="%f-%F"
screenshot-format=png
screenshot-png-compression=7

# ────────────────── WAYLAND SPECIFIC ──────────────────
wayland-app-id=mpv
wayland-present=yes
x11-bypass-compositor=yes

# ────────────────── PROFILES ──────────────────
[anime]
profile-desc=Anime (Anime4K leve)
deinterlace=no
scale=bilinear
cscale=bilinear
interpolation=no
deband-grain=0

# Optimized shaders for lower-end GPU: Mode A (Fast)
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"