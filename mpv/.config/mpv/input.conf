# Playback control
SPACE cycle pause
ENTER cycle fullscreen
ESC set fullscreen no
m cycle mute
o show-text "${time-pos} / ${duration}"

# Standard arrow keys to seek
LEFT seek -5
RIGHT seek 5
UP add volume 5
DOWN add volume -5

# Ctrl+/- to change video speed
Ctrl+RIGHT seek 60
Ctrl+LEFT seek -60
Ctrl+q quit
Ctrl+z set sub-delay 0
Ctrl+h script-binding simplehistory/show_history

# Shift +/- to longer seek
Shift+p cycle osd-bar
Shift+O show-text "${time-pos} / -${time-remaining}"

# Toggle fullscreen with 'f'
f cycle fullscreen

# Mouse bindings - set left click as main button (play/pause)
MBTN_LEFT cycle pause

# Playlist manipulation
n playlist-next
p playlist-prev

# Subtitle and audio cycling
v cycle sub
b cycle audio
Shift+v cycle sub down
Shift+b cycle audio down

# Disable default 0 and 9 keybindings
0 ignore
9 ignore
q ignore
s ignore
Shift+z ignore
Ctrl+Shift+LEFT ignore
Ctrl+Shift+RIGHT ignore
