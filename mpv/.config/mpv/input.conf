# Playback control
SPACE cycle pause
ENTER cycle fullscreen
ESC set fullscreen no
m cycle mute ; show-text "${?mute==yes:🔇 Muted}${?mute==no:🔊 Unmuted}" 
i cycle-values interpolation yes no ; show-text "Interpolation: ${interpolation}"
t show-text "${time-pos} / ${duration}"

# Standard arrow keys to seek
LEFT seek -5
RIGHT seek 5
UP add volume 5
DOWN add volume -5

# Subtitle position and size controls
Shift+UP add sub-pos -1  # Move subtitles up
Shift+DOWN add sub-pos +1  # Move subtitles down
Shift+LEFT add sub-scale -0.1  # Decrease subtitle size
Shift+RIGHT add sub-scale +0.1  # Increase subtitle size
Shift+t show-text "${time-pos} / -${time-remaining}"

# Ctrl+/- to change video speed
Ctrl+RIGHT seek 60
Ctrl+LEFT seek -60
Ctrl+q quit
Ctrl+z set sub-delay 0
Ctrl+n cycle-values audio-normalize yes no; show-text "Audio Normalization: ${audio-normalize}"

# Toggle fullscreen with 'f'
f cycle fullscreen
F cycle fullscreen

# Mouse bindings - set left click as main button (play/pause)
# MBTN_LEFT cycle pause

# Playlist manipulation
n playlist-next
p playlist-prev

# Subtitle and audio cycling
v cycle sub
b cycle audio
Shift+v cycle sub down
Shift+b cycle audio down

# Profiles
F2 apply-profile anime; show-text "Profile: Anime4K" 2000
F1 apply-profile default; show-text "Profile: Default" 2000

# Disable default 0 and 9 keybindings
0 ignore
9 ignore
j ignore
s ignore
r ignore
q ignore
Q ignore
Shift+z ignore
Shift+Z ignore
Ctrl+Shift+LEFT ignore
Ctrl+Shift+RIGHT ignore
