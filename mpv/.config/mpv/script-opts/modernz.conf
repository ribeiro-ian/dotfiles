# ────────────────── LANGUAGE AND DISPLAY ──────────────────
# interface language (see: https://github.com/Samillion/ModernZ/blob/main/docs/TRANSLATIONS.md)
language=en
# layout style: "modern" or "modern-compact"
layout=modern
# icon theme: "fluent" or "material"
icon_theme=material
# OSC font (default: mpv-osd-symbols or whatever is set in mpv.conf)
font=mpv-osd-symbols

# ────────────────── IDLE AND VISIBILITY ──────────────────
# show mpv logo when idle
idlescreen=yes
# show top bar in borderless/fullscreen: "auto", "yes", or "no"
window_top_bar=no
# show OSC when windowed
showwindowed=yes
# show OSC when fullscreen
showfullscreen=yes
# show OSC when paused
showonpause=yes
# keep OSC visible indefinitely while paused
keeponpause=no
# disable Santa hat in December
greenandgrumpy=no

# ────────────────── OSC BEHAVIOUR AND SCALING ──────────────────
# time (ms) before OSC hides when mouse is idle
hidetimeout=1500
# reset hide timer when seeking
seek_resets_hidetimeout=yes
# fade-out duration (ms); 0 disables fade
fadeduration=0
# enable fade-in when OSC appears
fadein=no
# minimum mouse movement (px) needed to trigger OSC
minmousemove=0
# only show OSC when hovering near the bottom
bottomhover=no
# hover zone height for bottomhover (px)
bottomhover_zone=130
# show OSC when seeking
osc_on_seek=yes
# show OSC at the start of every file
osc_on_start=yes
# keep OSC visible while cursor is within its bounds
osc_keep_with_cursor=no
# pause while dragging the seekbar with mouse
mouse_seek_pause=yes
# always show seekbar tooltip when dragging, even outside seekbar
force_seek_tooltip=no

# scale OSC relative to video size
vidscale=auto
# OSC scale factor in windowed mode
scalewindowed=1
# OSC scale factor in fullscreen mode
scalefullscreen=0.8

# ────────────────── ELEMENTS DISPLAY ──────────────────
# show title above seekbar
show_title=yes
# title format: "${media-title}" or "${filename}"
title=${media-title}
# font size for title above seekbar
title_font_size=32
# font size for chapter title
chapter_title_font_size=20
# show cache fill information
cache_info=no
# show cache download speed
cache_info_speed=no
# font size for cache info
cache_info_font_size=11

# show chapter title alongside timestamp below seekbar
show_chapter_title=yes
# chapter display format on seekbar hover; "no" to disable
chapter_fmt=%s

# show total duration instead of remaining time
timetotal=yes
# show milliseconds in timecodes
timems=no
# use Unicode minus sign for remaining time
unicodeminus=no
# "dynamic" shows MM:SS when possible, "fixed" always shows HH:MM:SS
time_format=dynamic
# font size for time display
time_font_size=20
# font size for tooltips
tooltip_font_size=18

# ────────────────── TITLE BAR ──────────────────
# show window title in borderless/fullscreen mode
show_window_title=yes
# title format for the top window bar
window_title=${media-title}
# font size for the window title bar
window_title_font_size=11
# show window controls (close, minimize, maximize) in borderless/fullscreen
window_controls=no

# ────────────────── SUBTITLE DISPLAY ──────────────────
# raise subtitles above the OSC when it is visible
raise_subtitles=yes
# how many pixels subtitles are raised when OSC is shown
raise_subtitle_amount=125

# ────────────────── BUTTONS ──────────────────
# show subtitles menu button
subtitles_button=yes
# show audio tracks menu button
audio_tracks_button=yes
# show jump backward/forward buttons
jump_buttons=yes
# jump amount in seconds (left-click)
jump_amount=10
# jump amount in seconds (right-click / shift-click on chapter buttons)
jump_more_amount=60
# show jump icon reflecting the jump amount (5, 10, or 30)
jump_icon_number=yes
# seek mode for jump buttons
jump_mode=relative
# keep jumping while holding down seek buttons
jump_softrepeat=yes
# show chapter skip backward/forward buttons
chapter_skip_buttons=no
# keep skipping while holding down chapter buttons
chapter_softrepeat=yes
# show next/previous playlist track buttons
track_nextprev_buttons=yes

# show mute button and volume slider
volume_control=yes
# volume slider scale: "linear" or "logarithmic"
volume_control_type=linear
# show playlist button; left-click = simple list, right-click = interactive
playlist_button=yes
# hide playlist button when no playlist exists
hide_empty_playlist_button=yes
# gray out playlist button when playlist is empty
gray_empty_playlist_button=yes

# show download button for web videos (requires yt-dlp and ffmpeg)
download_button=no
# default download directory for web videos
download_path=~~desktop/mpv
# show screenshot button
screenshot_button=yes

# show window-on-top toggle button
ontop_button=no
# show file loop button
loop_button=yes
# show shuffle button
shuffle_button=no
# show playback speed button
speed_button=no
# speed change per click
speed_button_click=1
# speed change per scroll tick
speed_button_scroll=0.1
# show info/stats button
info_button=no
# show fullscreen toggle button
fullscreen_button=yes

# allow looping by clicking the pause button
loop_in_pause=yes

# buttons that are always active regardless of state
buttons_always_active=none

# icon size for the play/pause button
playpause_size=32
# icon size for middle row buttons (skip, jump, chapter)
midbuttons_size=24
# icon size for side buttons (audio, subtitles, playlist, etc.)
sidebuttons_size=24

# show zoom controls in image viewer mode
zoom_control=yes
# maximum zoom-in level
zoom_in_max=4
# minimum zoom-out level
zoom_out_min=-1

# ────────────────── COLORS AND STYLE ──────────────────
# OSC background and title bar accent color
osc_color=#000000
# color of the window title in borderless/fullscreen
window_title_color=#EDE8E0
# color of window controls (close, minimize, maximize) in borderless/fullscreen
window_controls_color=#EDE8E0
# close button hover color
windowcontrols_close_hover=#F45C5B
# maximize button hover color
windowcontrols_max_hover=#F8BC3A
# minimize button hover color
windowcontrols_min_hover=#43CB44
# color of the title above seekbar
title_color=#EDE8E0
# color of cache info text
cache_info_color=#EDE8E0
# seekbar progress fill and handle color
seekbarfg_color=#C96642
# seekbar unfilled track color
seekbarbg_color=#262626
# seekbar cached range color
seekbar_cache_color=#918F8E
# match volume bar color to seekbar (overrides side_buttons_color)
volumebar_match_seek_color=yes
# timestamp color below seekbar
time_color=#EDE8E0
# chapter title color below seekbar
chapter_title_color=#EDE8E0
# side button color (audio, subtitles, playlist, etc.)
side_buttons_color=#EDE8E0
# middle button color (skip, jump, chapter, etc.)
middle_buttons_color=#EDE8E0
# play/pause button color
playpause_color=#EDE8E0
# color of a button while held/pressed
held_element_color=#6B6560
# color of a hovered button when "color" hover effect is active
hover_effect_color=#C96642
# thumbnail border color (used with thumbfast)
thumbnail_border_color=#C96642
# thumbnail border outline color
thumbnail_border_outline=#7A3E28

# ────────────────── OSC BACKGROUND BLUR ──────────────────
# alpha of the OSC background box (0=transparent, 255=opaque)
fade_alpha=169
# blur radius for OSC background; high values are CPU-intensive
fade_blur_strength=169
# transparency box strength (use with fade_blur_strength=0)
fade_transparency_strength=0
# alpha of the window title bar background
window_fade_alpha=100
# blur radius for window title bar; high values are CPU-intensive
window_fade_blur_strength=100
# transparency box strength for window title bar
window_fade_transparency_strength=0
# thumbnail border width (px) for thumbfast
thumbnail_border=2
# thumbnail border corner radius (0 to disable)
thumbnail_border_radius=4

# ────────────────── BUTTON HOVER EFFECTS ──────────────────
# active hover effects: "glow", "size", "color"; combine with commas
hover_effect=size,glow,color
# relative size of hovered button when "size" effect is active (%)
hover_button_size=120
# glow intensity when "glow" effect is active
button_glow_amount=8
# apply size hover effect to seekbar/volume slider handles
hover_effect_for_sliders=yes

# ────────────────── TOOLTIPS AND HINTS ──────────────────
# show tooltips for disabled/unavailable buttons
tooltips_for_disabled_elements=yes
# show text hints for info, loop, ontop, and screenshot buttons
tooltip_hints=yes

# ────────────────── SEEKBAR ──────────────────
# size ratio of the seekbar drag handle (0 ~ 1)
seek_handle_size=0.4
# show seek range overlay (buffered/cached region)
seekrange=yes
# transparency of the seek range overlay
seekrangealpha=150
# update chapter markers when duration changes (e.g. live streams)
livemarkers=yes
# snap to keyframes when dragging seekbar
seekbarkeyframes=no
# use rounded corners on seekbar slider
slider_rounded_corners=yes

# show chapter marker nibbles above seekbar
nibbles_top=yes
# show chapter marker nibbles below seekbar
nibbles_bottom=yes
# nibble style: "triangle", "bar", or "single-bar"
nibbles_style=bar

# automatically use keyframe mode for long videos
automatickeyframemode=yes
# video length threshold (seconds) to enable automatic keyframe mode
automatickeyframelimit=600

# show a persistent thin progress bar at the bottom of the screen
persistentprogress=no
# height of the persistent progress bar (px)
persistentprogressheight=17
# show buffer status in persistent bar for web videos
persistentbuffer=no

# ────────────────── GENERAL ──────────────────
# initial OSC visibility mode (set at startup only)
visibility=auto
# visibility modes to cycle through (underscore-separated)
visibility_modes=never_auto_always
# minimum interval between OSC redraws (seconds)
tick_delay=0.03
# use display FPS as the minimum redraw interval
tick_delay_follow_display_fps=no

# ────────────────── ELEMENT POSITIONS ──────────────────
# vertical position of title above seekbar (px)
title_height=96
# title height when a chapter title is also displayed
title_with_chapter_height=108
# vertical position of chapter title above seekbar (px)
chapter_title_height=91
# vertical position of timecodes (px)
time_codes_height=35
# timecode height in portrait/narrow window mode (px)
time_codes_centered_height=57
# vertical offset for tooltips (px)
tooltip_height_offset=2
# leftward shift for long tooltips (px)
tooltip_left_offset=5
# window width (px) below which layout switches to portrait mode
portrait_window_trigger=1000
# window width (px) below which the volume bar is hidden
hide_volume_bar_trigger=1150
# OSC height offset when title above seekbar is disabled
notitle_osc_h_offset=25
# OSC height offset when chapter title is disabled or absent
nochapter_osc_h_offset=10
# vertical offset for seek hover timecode tooltip (px)
seek_hover_tooltip_h_offset=0
# base OSC height before offsets (px)
osc_height=132

# ────────────────── MOUSE COMMANDS ──────────────────
# full reference: https://github.com/Samillion/ModernZ#mouse-commands-user-options

# title above seekbar
title_mbtn_left_command=script-binding stats/display-page-5
title_mbtn_mid_command=show-text ${path}
title_mbtn_right_command=ignore; script-message-to modernz osc-hide

# playlist button
playlist_mbtn_left_command=show-text ${playlist} 3000
playlist_mbtn_right_command=ignore; script-message-to modernz osc-hide

# volume slider
vol_ctrl_mbtn_left_command=no-osd cycle mute
vol_ctrl_wheel_down_command=no-osd add volume -2
vol_ctrl_wheel_up_command=no-osd add volume 2

# audio track button
audio_track_mbtn_mid_command=ignore; script-message-to modernz osc-hide
audio_track_mbtn_right_command=cycle audio down
audio_track_mbtn_left_command=cycle audio
audio_track_wheel_down_command=cycle audio
audio_track_wheel_up_command=cycle audio down

# subtitle track button
sub_track_mbtn_mid_command=ignore; script-message-to modernz osc-hide
sub_track_mbtn_right_command=cycle sub down
sub_track_mbtn_left_command=cycle sub
sub_track_wheel_down_command=cycle sub
sub_track_wheel_up_command=cycle sub down

# chapter skip buttons
chapter_prev_mbtn_left_command=add chapter -1
chapter_prev_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_prev_mbtn_right_command=ignore; script-message-to modernz osc-hide
chapter_next_mbtn_left_command=add chapter 1
chapter_next_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_next_mbtn_right_command=ignore; script-message-to modernz osc-hide

# chapter title below seekbar
chapter_title_mbtn_left_command=ignore; script-message-to modernz osc-hide
chapter_title_mbtn_right_command=show-text ${chapter-list} 3000

# playlist skip buttons
playlist_prev_mbtn_left_command=playlist-prev
playlist_prev_mbtn_mid_command=show-text ${playlist} 3000
playlist_prev_mbtn_right_command=ignore; script-message-to modernz osc-hide
playlist_next_mbtn_left_command=playlist-next
playlist_next_mbtn_mid_command=show-text ${playlist} 3000
playlist_next_mbtn_right_command=ignore; script-message-to modernz osc-hide

# fullscreen button
fullscreen_mbtn_left_command=cycle fullscreen
fullscreen_mbtn_right_command=cycle window-maximized

# info button
info_mbtn_left_command=script-binding stats/display-page-1-toggle

# screenshot button
screenshot_mbtn_left_command=osd-msg screenshot subtitles
