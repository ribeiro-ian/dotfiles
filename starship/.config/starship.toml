"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = """
$username$hostname\
$directory \
$fill \
$cmd_duration
$character"""

palette = 'Claude'

[username]
show_always = true
format = '[$user](bold user)[@](dimmed user)'

[hostname]
ssh_only = false
format = '[$hostname](bold user)[:](dimmed user)'

[directory]
read_only = " ¾░î¥"
style = 'bold accent'
format = '[$path]($style)[$read_only]($style)'
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 0
format = '[took $duration](bold gray)'
show_milliseconds = true

[character]
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold red)'

[time]
disabled = true

[fill]
symbol = '┬À'
style = 'dark'

# Define custom colors
[palettes.Claude]
accent = '#C96642'
user = '#A584E0'
red = '#D95C5C'
green = '#5BAF7A'
gray = '#6B6560'
dark = '#2E2B28'

