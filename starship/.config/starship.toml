"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = """
$username$hostname\
$directory \
$fill \
$cmd_duration
$character"""

palette = 'Default'
[palettes.Default]
accent = "255"
sys = "253"
gray = "245"

[username]
show_always = true
format = '[$user](bold sys)[@](dimmed prev_fg)'

[hostname]
ssh_only = false
format = '[$hostname](bold prev_fg)[:](dimmed prev_fg)'

[directory]
read_only = " ¾░î¥"
style = 'bold accent'
format = '[$path]($style)[$read_only]($style)'
truncation_length = 3
truncate_to_repo = true

[character]
success_symbol = '[\$](bold green)'
error_symbol = '[\$](bold red)'

[cmd_duration]
min_time = 0
show_milliseconds = false
format = '[¾░Ü¡ $duration](bold gray)'

[fill]
symbol = '┬À'
style = 'bright-black'
 
