add_newline = false

format = """
$username\
$directory\
$fill \
$time
$character
"""

palette = 'Omni'

# Define custom colors
[palettes.Monokai]
red = '#f92672'
green = '#a6e22e'
blue = '#66d9ef'
yellow = '#e6db74'
dot = '#3e3d33'
dir = '#a6e22e'
time = '#e6db74'
user = '#f92672'

[palettes.Gruvbox]
red = '#fb4934'
green = '#b8bb26'
blue = '#83a598'
yellow = '#fabd2f'
dot = '#3c3836'
dir = '#458588'
time = '#fabd2f'
user = '#fe8019'

[palettes.Omni]
red = '#E96379'
green = '#67E480'
blue = '#78D1E1'
yellow = '#E7DE79'
dot = '#41414D'
dir = '#5a4c7f'
time = '#E7DE79'
user = '#E89E64'

[directory]
read_only = " ¾░î¥"
style = 'bold dir'

[username]
style_user = 'bold user'

[time]
disabled = false
style = 'bold time'
format = '[$time]($style)'

[fill]
style = 'dot'
symbol = '┬À'

[cpp]
disabled = false
symbol = "¯İØ "
style = 'lang'
format = 'via [$name $version]($style)'

