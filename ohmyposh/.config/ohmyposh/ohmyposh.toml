version = 4

console_title_template = '{{ if eq .Folder .Env.USER }}home{{ else }}{{ .PWD }}{{end}} ─ {{ .Env.TERM_PROGRAM }}'
shell_integration = true
final_space = true

[palettes] # Set palette via export OMP_PALLETE in .zshenv
template = '{{ .Env.OMP_PALETTE }}'

[palettes.list.Claude]
accent = '#D97757'

[palettes.list.Gruvzima]
accent = '#5BC2E7'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

  [[blocks.segments]]
  type = 'path'
  style = 'plain'
  foreground = 'p:accent'
  foreground_templates = [
    '{{ if eq .Env.TERM_PROGRAM "vscode" }}blue{{ end }}'
  ]
  template = '<b>{{ if .Segments.Git.RepoName }}{{ .Segments.Git.RepoName }}{{ if .Segments.Git.RelativeDir }}/{{ .Format .Segments.Git.RelativeDir }}{{ end }}{{ else }}{{ .Path }}{{ end }} </b>'
  [blocks.segments.properties]
    style = 'agnoster_full'
    max_depth = 3

  [[blocks.segments]]
  type = 'git'
  style = 'plain'
  foreground = 'transparent'
  background = 'transparent'
  template = ''
    [blocks.segments.properties]
    fetch_status = false

[[blocks]]
type = 'prompt'
alignment = 'right'
overflow = 'hide'

  [[blocks.segments]]
  type = 'executiontime'
  style = 'plain'
  foreground = '7'
  template = ' 󱦟 {{ .FormattedMs }}'
    [blocks.segments.properties]
    threshold = 5000 # 5s
    style = 'austin'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

  [[blocks.segments]]
  type = 'text'
  style = 'plain'
  foreground_templates = [
    '{{ if gt .Code 0}}red{{end}}',
    '{{ if eq .Code 0}}green{{end}}'
  ]
  template = '<b>$<b>'

[transient_prompt]
foreground_templates = [
  '{{ if gt .Code 0}}red{{end}}',
  '{{ if eq .Code 0}}green{{end}}'
]
template = '<b>><b> '

[secondary_prompt]
foreground = 'white'
template = '>> '

